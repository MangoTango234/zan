# Opt-in overlay that adds on-device transcription (WhisperKit) to the base spec.
# Generate the project WITH WhisperKit:
#   xcodegen generate --spec project-whisperkit.yml
# Then build/run as usual. The default `xcodegen generate` (project.yml) omits it.
#
# The Swift code uses `#if canImport(WhisperKit)`, so it compiles either way:
# without this overlay the on-device engine is simply unavailable at runtime.

include:
  - project.yml

packages:
  WhisperKit:
    url: https://github.com/argmaxinc/argmax-oss-swift.git
    from: "0.9.0"

targets:
  Zan:
    # Merged with (appended to) the base spec's dependencies, so only the
    # WhisperKit dependency is declared here.
    dependencies:
      - package: WhisperKit
        product: WhisperKit
